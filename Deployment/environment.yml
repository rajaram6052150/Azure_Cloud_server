# Environment Configuration for Azure ML Deployment
# Federated Learning ModelA with BatchNorm, Dropout, and Sigmoid

name: federated-modelA-env
channels:
  - conda-forge
  - pytorch
  - defaults

dependencies:
  # Python version
  - python=3.10

  # Core ML/DL
  - pytorch::pytorch
  - pytorch::pytorch-cuda=11.8
  - pytorch::torchvision
  - pytorch::torchaudio
  - numpy>=1.24.3
  - scipy>=1.11.2
  - scikit-learn>=1.3.0

  # Data processing
  - pandas>=2.0.3
  - pyyaml>=6.0.1

  # Utilities
  - pip>=23.0
  - pip:
    - flwr==1.4.0
    - azure-ai-ml>=1.11.0
    - azure-identity>=1.14.0
    - Flask>=2.3.3
    - Werkzeug>=2.3.7
    - requests>=2.31.0
    - python-dotenv>=1.0.0
    - tqdm>=4.66.1
